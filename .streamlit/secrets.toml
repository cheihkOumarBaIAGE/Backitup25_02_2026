import streamlit as st
import pandas as pd
from datetime import datetime
from io import BytesIO
import zipfile

# ---------------------------------------------------------
# 1. CONFIGURATION ET CHARGEMENT DU SECRETS.TOML
# ---------------------------------------------------------
st.set_page_config(page_title="Minatholy V3.2", layout="wide", page_icon="🛡️")

try:
    # On récupère ton mapping complet depuis secrets.toml
    SCHOOL_MAPPINGS = st.secrets["SCHOOL_MAPPINGS"]
except Exception:
    st.error("❌ Erreur : Le fichier .streamlit/secrets.toml est introuvable ou mal configuré.")
    st.stop()

# ---------------------------------------------------------
# 2. FONCTIONS DE NETTOYAGE (ANTI-BUG)
# ---------------------------------------------------------
def clean_columns(df):
    """Nettoie les colonnes et renomme 'E-mail' en 'Member Email'."""
    # Nettoyage des espaces autour des noms de colonnes
    df.columns = [str(c).strip() for c in df.columns]
    
    # Mapping intelligent pour retrouver les bonnes colonnes peu importe l'Excel
    detection_map = {
        'Member Email': ['e-mail', 'email', 'identifiant', 'mail', 'login'],
        'Classe': ['classe', 'class', 'groupe'],
        'Nom': ['nom', 'last name'],
        'Prénom': ['prénom', 'prenom', 'first name']
    }
    
    new_names = {}
    for col in df.columns:
        c_low = col.lower()
        for officiel, variantes in detection_map.items():
            if any(v == c_low for v in variantes) or c_low == officiel.lower():
                new_names[col] = officiel
    
    return df.rename(columns=new_names)

def remove_accents(s):
    """Nettoie les caractères spéciaux pour Blackboard."""
    if not isinstance(s, str): return s
    accents = {'à':'a','â':'a','ä':'a','é':'e','è':'e','ê':'e','ë':'e','î':'i','ï':'i','ô':'o','ö':'o','û':'u','ü':'u'}
    for a, b in accents.items(): s = s.replace(a, b)
    return s

# ---------------------------------------------------------
# 3. INTERFACE UTILISATEUR (STREAMLIT)
# ---------------------------------------------------------
st.title("🛡️ Minatholy V3.2")
st.subheader("Dashboard Automatisé")

with st.sidebar:
    st.header("⚙️ Configuration")
    selected_school = st.selectbox("Choisir l'école", list(SCHOOL_MAPPINGS.keys()))
    uploaded_file = st.file_uploader("Fichier Excel (XLSX, XLS)", type=["xlsx", "xls"])
    
    st.divider()
    st.header("👥 Administration")
    admin_input = st.text_area("Emails Admins (Managers)", 
                                "marie-bernadette.ndione@groupeism.sn\nmar-sarr.ndiaye@groupeism.sn")

if uploaded_file:
    # Lecture et application immédiate du FIX de colonnes
    df_raw = pd.read_excel(uploaded_file)
    df = clean_columns(df_raw)
    
    # Vérification que les colonnes vitales sont présentes
    if "Member Email" not in df.columns or "Classe" not in df.columns:
        st.error("❌ Erreur de colonnes")
        st.write("Colonnes trouvées :", list(df.columns))
        st.info("Le code cherchait 'E-mail' ou 'Identifiant' pour l'email.")
        st.stop()

    if st.button("🚀 LANCER LE TRAITEMENT", type="primary"):
        mapping = SCHOOL_MAPPINGS.get(selected_school, {})
        
        # Nettoyage des valeurs dans les cellules
        df['Classe_Fix'] = df['Classe'].astype(str).str.strip()
        valid_df = df[df["Member Email"].str.contains("@", na=False)].copy()
        valid_df["Group Email"] = valid_df["Classe_Fix"].map(mapping)
        
        # --- A. GOOGLE GROUPS (Mailing Lists) ---
        gw_df = valid_df.dropna(subset=["Group Email"])[["Group Email", "Member Email"]].copy()
        gw_df.columns = ["Group Email [Required]", "Member Email"]
        gw_df["Member Type"], gw_df["Member Role"] = "USER", "MEMBER"
        
        # Ajout des managers
        admins = [a.strip() for a in admin_input.split('\n') if a.strip()]
        admin_data = []
        for g_mail in gw_df["Group Email [Required]"].unique():
            for a_mail in admins:
                admin_data.append([g_mail, a_mail, "USER", "MANAGER"])
        full_gw = pd.concat([gw_df, pd.DataFrame(admin_data, columns=gw_df.columns)])

        # --- B. BLACKBOARD (Profils) ---
        blu_df = pd.DataFrame({
            "Nom d'utilisateur": valid_df["Member Email"],
            "Nom": valid_df["Nom"].fillna('').str.upper().apply(remove_accents),
            "Prénom": '"' + valid_df["Prénom"].fillna('').apply(remove_accents) + '"',
            "Adresse e-mail": valid_df["Member Email"],
            "Pass": "ismapps2025,,,,,,,,,,,,,,,,,1382"
        })

        # --- C. AFFICHAGE DU RAPPORT (DASHBOARD) ---
        st.divider()
        st.header("📊 Rapport d'exécution")
        m1, m2, m3 = st.columns(3)
        m1.metric("Étudiants Identifiés", len(valid_df))
        m2.metric("Classes Mappées", gw_df["Group Email [Required]"].nunique())
        m3.metric("Emails Invalides", len(df) - len(valid_df))

        # Alertes sur les classes non trouvées
        unmapped = valid_df[valid_df["Group Email"].isna()]["Classe_Fix"].unique()
        if len(unmapped) > 0:
            with st.expander("⚠️ Classes non reconnues (à vérifier dans le mapping)", expanded=True):
                st.write(list(unmapped))

        # --- D. TÉLÉCHARGEMENT ---
        zip_buffer = BytesIO()
        with zipfile.ZipFile(zip_buffer, "w") as zf:
            zf.writestr(f"Mailing_Lists_{selected_school}.csv", full_gw.to_csv(index=False, encoding="utf-8-sig"))
            zf.writestr(f"Profils_Blackboard_{selected_school}.csv", blu_df.to_csv(index=False, encoding="utf-8-sig"))
        
        st.divider()
        st.download_button(
            label="📥 Télécharger les fichiers CSV (ZIP)",
            data=zip_buffer.getvalue(),
            file_name=f"Minatholy_{selected_school}_{datetime.now().strftime('%d-%m-%Hh%M')}.zip",
            mime="application/zip",
            use_container_width=True
        )

st.caption("Minatholy V3.2 | ISM | Auto-Fix 'E-mail' & 'Classe' activé")
